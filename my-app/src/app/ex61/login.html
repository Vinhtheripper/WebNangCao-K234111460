<div class="container mt-4">
  <div class="card" style="width: 22rem">
    <div class="card-header">Login System</div>
    <div class="card-body">
      <form (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label for="name-reg" class="form-label">User Name:</label>
          <input
            type="text"
            class="form-control"
            id="name-reg"
            name="name"
            [(ngModel)]="username"
          />
        </div>
        <div class="mb-3">
          <label for="password-reg" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password-reg"
            name="password"
            [(ngModel)]="password"
          />
        </div>
        <div class="mb-3">
          <button type="submit" class="btn btn-primary me-2">Login</button>
          <button type="button" class="btn btn-secondary" (click)="onLogout()">Logout</button>
        </div>
      </form>
      <div class="alert alert-success mt-2 mb-2" *ngIf="statusMessage">{{ statusMessage }}</div>
      <div class="alert alert-info mt-2 mb-0" *ngIf="cookieMessage">{{ cookieMessage }}</div>
    </div>
  </div>
</div>
