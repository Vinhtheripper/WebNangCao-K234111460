<div class="payment-container">
    <div class="payment-card">
        <h1>Thanh Toán với MoMo</h1>
        
        <form *ngIf="!loading" (ngSubmit)="payWithMoMo()">
            <!-- Error Message -->
            <div *ngIf="errorMsg" class="alert alert-danger">
                {{ errorMsg }}
            </div>

            <!-- Success Message -->
            <div *ngIf="successMsg" class="alert alert-success">
                {{ successMsg }}
            </div>

            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Họ và Tên:</label>
                <input 
                    type="text" 
                    id="fullName" 
                    [(ngModel)]="fullName" 
                    name="fullName"
                    class="form-control"
                    placeholder="Nhập họ và tên"
                    required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email:</label>
                <input 
                    type="email" 
                    id="email" 
                    [(ngModel)]="email" 
                    name="email"
                    class="form-control"
                    placeholder="Nhập địa chỉ email"
                    required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input 
                    type="tel" 
                    id="phone" 
                    [(ngModel)]="phone" 
                    name="phone"
                    class="form-control"
                    placeholder="Nhập số điện thoại"
                    required>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label for="amount">Số tiền (VND):</label>
                <input 
                    type="number" 
                    id="amount" 
                    [(ngModel)]="amount" 
                    name="amount"
                    class="form-control"
                    placeholder="Nhập số tiền cần thanh toán"
                    min="10000"
                    required>
                <small>Tối thiểu: 10,000 VND</small>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button 
                    type="submit" 
                    class="btn btn-momo"
                    [disabled]="loading">
                    <span *ngIf="!loading">💳 Thanh Toán với MoMo</span>
                    <span *ngIf="loading">Đang xử lý...</span>
                </button>
                <button 
                    type="button" 
                    class="btn btn-reset"
                    (click)="resetForm()"
                    [disabled]="loading">
                    Xóa
                </button>
            </div>
        </form>

        <!-- Loading State -->
        <div *ngIf="loading" class="loading">
            <div class="spinner"></div>
            <p>Đang kết nối đến cổng thanh toán MoMo...</p>
        </div>
    </div>
</div>
